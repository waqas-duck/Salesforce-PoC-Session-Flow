# NOTE: the values below are project defaults for scaffolding. Replace the ECR
# registry, AWS region, vault path/key, and ECS cluster/service/role names with
# your environment's real values before a production deploy.
projectSettings:
  src: [src]
  test: [src/__tests__]
  unitTestFramework: jest

actionSettings:
  docker:
    enabled: true
    imageName: 'session-flow'
    registry:
      type: ecr
      ecr:
        region: 'us-east-2'
      creds:
        source: vault
        path: secret/data/session-flow aws | OIDC_ROLE
    images:
      - dockerfile: Dockerfile
        suffix: 'api'
        platforms: 
          - linux/amd64
    dev:
      registry:
        type: ecr
        ecr:
          region: 'us-east-2'

deploy:
  swimlanes:
    embark_dev:
      aws_fargate:
        cluster_name: 'session-flow-cluster'
        service_name: 'session-flow-svc'
        executionRoleName: 'session-flow-exec-role'
        taskRoleName: 'session-flow-task-role'
        container_def:
          - name: 'session-flow'
            imageURI: session-flow:latest
            
      creds:
        source: vault
        path:
          - secret/data/session-flow aws | AWS_ROLE_TO_ASSUME